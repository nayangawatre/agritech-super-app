<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register | AgriTech Super App</title>

    <link rel="stylesheet" href="css/auth.css">

</head>
<body>

<div class="auth-container">

    <div class="auth-card">

        <h2>Create Account</h2>

        <p>Join AgriTech Super App Today</p>

        <form id="registerForm">

            <div class="form-group">
                <input
                    type="text"
                    id="name"
                    placeholder="Full Name"
                    required>
            </div>

            <div class="form-group">
                <input
                    type="email"
                    id="email"
                    placeholder="Email Address"
                    required>
            </div>

            <div class="form-group">
                <input
                    type="tel"
                    id="mobile"
                    placeholder="Mobile Number"
                    required>
            </div>

            <div class="form-group">
                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required>
            </div>

            <div class="form-group">
                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm Password"
                    required>
            </div>

            <div class="checkbox">
                <input type="checkbox"
                       id="showPassword">

                <label for="showPassword">
                    Show Password
                </label>
            </div>

            <button type="submit"
                    class="register-btn">

                Register
            </button>

        </form>

        <div class="login-link">

            Already have an account?

            <a href="login.html">
                Login
            </a>

        </div>

    </div>

</div>

<script src="js/register.js"></script>

</body>
</html>
