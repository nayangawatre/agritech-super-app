<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | AgriTech Super App</title>

    <link rel="stylesheet" href="css/auth.css">

</head>
<body>

<div class="auth-container">

    <div class="auth-card">

        <h2>Welcome Back</h2>

        <p>Login to continue</p>

        <form id="loginForm">

            <div class="form-group">
                <input
                    type="email"
                    id="email"
                    placeholder="Email Address"
                    required>
            </div>

            <div class="form-group">
                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required>
            </div>

            <div class="checkbox">

                <input
                    type="checkbox"
                    id="showPassword">

                <label for="showPassword">
                    Show Password
                </label>

            </div>

            <button
                type="submit"
                class="register-btn">

                Login

            </button>

        </form>

        <div class="login-link">

            Don't have an account?

            <a href="register.html">
                Register
            </a>

        </div>

    </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
